<!DOCTYPE html>
<html>
<head>
<title>Booking</title>
<link rel="stylesheet" href="{{ url_for('static',filename='css/style.css') }}">
</head>

<body>

<div class="container">

<h2>Confirm Booking</h2>

<form method="post" action="/tickets">

Movie:
<input type="text" name="movie" value="{{movie}}" readonly><br>

Theatre:
<input type="text" name="theatre" value="{{theatre}}" readonly><br>

Price per seat:
<input type="text" name="price" value="{{price}}" readonly><br>

Seats:
<input type="number" name="seats" min="1" required><br>

<button type="submit">Book Ticket</button>

</form>

</div>

</body>
</html>
